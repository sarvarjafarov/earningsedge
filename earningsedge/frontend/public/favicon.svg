<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EarningsEdge">
  <!--
    EarningsEdge favicon — scalable SVG.
    Works in Chrome, Firefox, Safari 14+, Edge 79+, and all modern browsers.
    Includes a media query so the dark background lightens slightly in
    macOS Safari's pinned-tab dark accent area.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1722"/>
      <stop offset="100%" stop-color="#04090e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#00ffd1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <path
    d="M11 46 L24 30 L34 40 L48 16"
    fill="none"
    stroke="url(#line)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="48" cy="16" r="5" fill="#00ffd1"/>
</svg>
